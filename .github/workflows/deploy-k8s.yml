name: Deploy to EKS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: tech-challenge-app
  EKS_CLUSTER_NAME: tech-challenge-cluster
  K8S_NAMESPACE: tech-challenge

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS secrets
        id: aws-secrets
        shell: bash
        run: |
          if [[ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" && -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build and test
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: mvn -B clean package

      - name: Configure AWS credentials
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY

      - name: Build and push image to ECR
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Setup kubectl
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.30.0"

      - name: Configure kubeconfig
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Deploy manifests
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/rbac.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Update deployment image
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: |
          kubectl set image deployment/tech-challenge app=$IMAGE_URI -n $K8S_NAMESPACE --record

      - name: Wait for rollout
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: kubectl rollout status deployment/tech-challenge -n $K8S_NAMESPACE --timeout=5m

      - name: Validate health after deploy
        if: ${{ steps.aws-secrets.outputs.available == 'true' }}
        run: |
          kubectl port-forward svc/tech-challenge 8080:8080 -n $K8S_NAMESPACE >/tmp/port-forward.log 2>&1 &
          sleep 10
          curl -fsS http://localhost:8080/actuator/health

      - name: Skip deploy when AWS secrets are missing
        if: ${{ steps.aws-secrets.outputs.available != 'true' }}
        run: |
          echo "::warning::Deploy to EKS skipped. Configure AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in repository secrets."
