name: CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE: tech-challenge

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven

      - name: Build and run tests
        run: mvn -B clean package

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-build
          path: target/*.jar

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-build
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        id: kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "deploy_enabled=false" >> $GITHUB_OUTPUT
            echo "::warning::KUBE_CONFIG not configured, skipping deployment steps"
            exit 0
          fi
          
          mkdir -p $HOME/.kube

          if echo "$KUBE_CONFIG_DATA" | base64 -d > $HOME/.kube/config 2>/dev/null; then
            echo "Kubeconfig decoded from base64 secret."
          else
            echo "$KUBE_CONFIG_DATA" > $HOME/.kube/config
            echo "Kubeconfig loaded as plain text secret."
          fi

          chmod 600 $HOME/.kube/config

          if kubectl cluster-info >/dev/null 2>&1; then
            echo "deploy_enabled=true" >> $GITHUB_OUTPUT
            kubectl config current-context
          else
            echo "deploy_enabled=false" >> $GITHUB_OUTPUT
            echo "::warning::KUBE_CONFIG is invalid/unreachable in this runner. Skipping deployment steps."
          fi

      - name: Create namespace
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl create namespace ${{ env.KUBE_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Label namespace
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl label namespace ${{ env.KUBE_NAMESPACE }} app=tech-challenge --overwrite

      - name: Apply RBAC manifests
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f k8s/rbac.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Deploy PostgreSQL
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f k8s/postgres.yaml -n ${{ env.KUBE_NAMESPACE }}
          echo "Waiting for PostgreSQL to be ready..."
          kubectl wait --for=condition=ready pod -l app=postgres -n ${{ env.KUBE_NAMESPACE }} --timeout=300s

      - name: Apply ConfigMap and Secrets
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f k8s/configmap.yaml -n ${{ env.KUBE_NAMESPACE }}
          kubectl apply -f k8s/secret.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Update Deployment image
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          kubectl set image deployment/tech-challenge \
            app=$IMAGE \
            -n ${{ env.KUBE_NAMESPACE }} \
            --record || true

      - name: Apply Deployment and Services
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f k8s/deployment.yaml -n ${{ env.KUBE_NAMESPACE }}
          kubectl apply -f k8s/service.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Apply HPA
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl apply -f k8s/hpa.yaml -n ${{ env.KUBE_NAMESPACE }}

      - name: Wait for rollout
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/tech-challenge \
            -n ${{ env.KUBE_NAMESPACE }} \
            --timeout=5m

      - name: Check deployment status
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          kubectl get deployment,pods,svc -n ${{ env.KUBE_NAMESPACE }}

      - name: Verify health
        if: steps.kubeconfig.outputs.deploy_enabled == 'true'
        run: |
          echo "Verifying application health..."
          kubectl port-forward svc/tech-challenge 8080:8080 -n ${{ env.KUBE_NAMESPACE }} &
          sleep 5
          curl -f http://localhost:8080/actuator/health || echo "Health check failed (pod may still be starting)"

      - name: Deployment skipped
        if: steps.kubeconfig.outputs.deploy_enabled != 'true'
        run: |
          echo "::warning::Kubernetes deployment skipped because cluster context is unavailable."

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Notify deployment failure
        run: |
          echo "::error::Deployment failed. Check logs above for details."

  success:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Deployment successful
        run: |
          echo "::notice::Deployment completed successfully!"
          echo "Application deployed to namespace: ${{ env.KUBE_NAMESPACE }}"

      

