version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: tech-challange-app
    depends_on:
      - db
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=db
      - DB_USER=root
      - DB_PASSWORD=root
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USERNAME=rafaellarosa07@gmail.com
      - MAIL_PASSWORD=eyjekybvrihzgtvq
      - JWT_SECRET=minhaChaveSecretaSuperSegura123456
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin123
    ports:
      - "8080:8080"

volumes:
  mysql_data:
