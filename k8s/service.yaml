apiVersion: v1
kind: Service
metadata:
  name: tech-challenge
  namespace: default
  labels:
    app: tech-challenge
  annotations:
    description: "Tech Challenge API Service"
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app: tech-challenge
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
  selector:
    app: tech-challenge

---
# NodePort Service (para acesso local em desenvolvimento)
apiVersion: v1
kind: Service
metadata:
  name: tech-challenge-nodeport
  namespace: default
  labels:
    app: tech-challenge
spec:
  type: NodePort
  selector:
    app: tech-challenge
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
      nodePort: 30080

---
# LoadBalancer Service (para produção)
apiVersion: v1
kind: Service
metadata:
  name: tech-challenge-lb
  namespace: default
  labels:
    app: tech-challenge
spec:
  type: LoadBalancer
  selector:
    app: tech-challenge
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
