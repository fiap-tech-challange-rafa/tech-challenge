apiVersion: v1
kind: Namespace
metadata:
  name: tech-challenge
  labels:
    app: tech-challenge
    environment: production

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tech-challenge-quota
  namespace: tech-challenge
spec:
  hard:
    requests.cpu: "2"
    requests.memory: "2Gi"
    limits.cpu: "4"
    limits.memory: "4Gi"
    pods: "20"
    services: "10"

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tech-challenge-network-policy
  namespace: tech-challenge
spec:
  podSelector:
    matchLabels:
      app: tech-challenge
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: tech-challenge
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
