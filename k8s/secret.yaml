metadata:
  name: postgres-credentials
  namespace: default
type: Opaque
data:
  # postgres (base64)
  POSTGRES_USER: cG9zdGdyZXM=
  # tech_challenge_password (base64)
  POSTGRES_PASSWORD: dGVjaF9jaGFsbGVuZ2VfcGFzc3dvcmQ=
  # tech_challenge (base64)
  POSTGRES_DB: dGVjaF9jaGFsbGVuZ2U=
