apiVersion: v1
kind: Secret
metadata:
  name: tech-challenge-secrets
  namespace: default
type: Opaque
data:
  # Credenciais do banco de dados (base64 encoded)
  # postgres (base64)
  SPRING_DATASOURCE_USERNAME: cG9zdGdyZXM=
  # tech_challenge_password (base64)
  SPRING_DATASOURCE_PASSWORD: dGVjaF9jaGFsbGVuZ2VfcGFzc3dvcmQ=

  # JWT Secret (base64 encoded)
  # jwt-secret-key-for-tech-challenge (base64)
  JWT_SECRET: and0LXNlY3JldC1rZXktZm9yLXRlY2gtY2hhbGxlbmdl

  # Admin credentials (base64 encoded)
  # admin (base64)
  ADMIN_USERNAME: YWRtaW4=
  # admin123 (base64)
  ADMIN_PASSWORD: YWRtaW4xMjM=

