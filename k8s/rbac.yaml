apiVersion: v1
kind: ServiceAccount
metadata:
  name: tech-challenge
  namespace: default
  labels:
    app: tech-challenge

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tech-challenge
  namespace: default
rules:
  # Permitir ler secrets para credenciais
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["tech-challenge-secrets", "postgres-credentials"]
    verbs: ["get"]

  # Permitir ler configmaps
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["tech-challenge-config"]
    verbs: ["get"]

  # Permitir criar logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tech-challenge
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tech-challenge
subjects:
  - kind: ServiceAccount
    name: tech-challenge
    namespace: default
